<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wheel of Graciousness</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bungee+Shade&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #000000;
            --text-color: #ffffff;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Nunito', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
            /* Prevent pull-to-refresh on mobile */
            overscroll-behavior-y: none; 
        }

        h1 {
            font-family: 'Bungee Shade', cursive;
            font-size: 2.2rem;
            text-align: center;
            margin-top: 10px;
            margin-bottom: 20px;
            color: #fff;
            padding: 0 15px;
            line-height: 1.1;
        }

        .wheel-container {
            position: relative;
            width: 90vw;
            max-width: 450px; /* Ukuran pas untuk portrait HP */
            aspect-ratio: 1/1;
            margin: 10px 0;
            /* Cegah scroll layar saat mengusap roda */
            touch-action: none; 
            cursor: grab;
        }

        .wheel-container:active {
            cursor: grabbing;
        }

        canvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            /* Bayangan sedikit agar menonjol */
            box-shadow: 0 0 20px rgba(255,255,255,0.1); 
        }

        /* Jarum penunjuk warna putih di atas */
        .pointer {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 35px;
            height: 50px;
            background-color: white;
            clip-path: polygon(50% 100%, 0 0, 100% 0);
            z-index: 10;
        }

        .controls {
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .hint {
            font-size: 0.9rem;
            color: #aaa;
            margin-bottom: 5px;
            font-weight: 700;
        }

        button.spin-btn {
            font-family: 'Bungee Shade', cursive;
            background-color: #fff;
            color: #000;
            border: none;
            padding: 15px 50px;
            font-size: 1.5rem;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
            touch-action: manipulation;
        }

        button.spin-btn:hover {
            transform: scale(1.05);
            background-color: #f0f0f0;
        }

        button.spin-btn:active {
            transform: scale(0.95);
        }

        button.spin-btn:disabled {
            background-color: #555;
            color: #222;
            cursor: not-allowed;
            transform: none;
        }

        /* Modal / Pop-up */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 100;
            padding: 20px;
            box-sizing: border-box;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background: #fff;
            color: #000;
            padding: 30px 20px;
            border-radius: 20px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            transform: translateY(20px);
            transition: transform 0.3s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .modal-overlay.active .modal-content {
            transform: translateY(0);
        }

        .modal-title {
            font-family: 'Bungee Shade', cursive;
            font-size: 1.6rem;
            margin-top: 0;
            margin-bottom: 15px;
            line-height: 1.2;
        }

        .modal-body {
            font-size: 1.05rem;
            line-height: 1.5;
            margin-bottom: 25px;
            font-weight: 700;
        }

        button.close-btn {
            font-family: 'Nunito', sans-serif;
            font-weight: 900;
            background-color: #000;
            color: #fff;
            border: none;
            padding: 12px 35px;
            font-size: 1.1rem;
            border-radius: 30px;
            cursor: pointer;
            transition: background-color 0.2s;
            width: 100%;
            max-width: 200px;
        }

        button.close-btn:hover {
            background-color: #333;
        }

    </style>
</head>
<body>

    <h1>Wheel of<br>Graciousness</h1>

    <div class="wheel-container" id="wheelContainer">
        <div class="pointer"></div>
        <!-- Resolusi internal canvas dibuat besar (800x800) agar tidak pecah di layar HP modern -->
        <canvas id="wheelCanvas" width="800" height="800"></canvas>
    </div>

    <div class="controls">
        <div class="hint">Tap button or swipe the wheel!</div>
        <button class="spin-btn" id="spinBtn" onclick="triggerSpin()">SPIN</button>
    </div>

    <!-- Popup Modal -->
    <div class="modal-overlay" id="modal">
        <div class="modal-content">
            <h2 class="modal-title" id="modalTitle">Title</h2>
            <div class="modal-body" id="modalBody">Description goes here</div>
            <button class="close-btn" onclick="closeModal()">Got it!</button>
        </div>
    </div>

    <script>
        const prompts = [
            { title: "BESTIES +1", color: "#f497bc", text: "Perwakilan kelompok sebutin nama semua anggota grup lawan. Kalau bisa dengan nama belakang +2." },
            { title: "SILSILAH +1-4", color: "#6baf76", text: "Menyebutkan dengan benar umur (pada saat itu) semua anggota grup lawan. Benar semua: +4, setiap salah -1, maks salah 3x." },
            { title: "K. CEMARA +2", color: "#ffc107", text: "Dalam 30 detik bisa baris berdasarkan urutan ulang tahun/nama belakang/dkk (penjaga pos yg pilih)." },
            { title: "BDG 48 +1-3", color: "#7c63b1", text: "Kelompok lawan boleh rekues lagu sekolah minggu untuk dinyanyikan keras-keras dan pakai gerakan oleh seluruh anggota kelompok. Kelompok lawan menilai dan memberikan poin antara 1-3." },
            { title: "FOTSTUD +1-3", color: "#e3e0c8", text: "Diberi 30 detik untuk berpose kelompok sekreatif mungkin. Kelompok lawan menilai dan memberikan poin antara 1-3." },
            { title: "APRESIASI +1", color: "#ff7b42", text: "Bilang makasih/kasih pujian yang tulus dan melelehkan hati panitia setempat <3. Kalau panitia merasa tersentuh ginjalnya panitia bisa menambahkan 1 poin lagi." },
            { title: "AYAT EMAS +1", color: "#4fc3a1", text: "Diberi waktu persiapan 30 dtk, seluruh anggota kelompok berdiri untuk ayat hafalan apapun bersama-sama." }
        ];

        const canvas = document.getElementById("wheelCanvas");
        const ctx = canvas.getContext("2d");
        const spinBtn = document.getElementById("spinBtn");
        const wheelContainer = document.getElementById("wheelContainer");
        
        let currentAngle = -Math.PI / 2 + ((2 * Math.PI / prompts.length) / 2); // Mulai pada posisi rapi
        let isSpinning = false;
        let spinVelocity = 0;
        
        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;
        const radius = canvas.width / 2;
        const numSlices = prompts.length;
        const sliceAngle = (2 * Math.PI) / numSlices;

        // Variables untuk fitur swipe / touchscreen
        let isDragging = false;
        let lastAngle = 0;
        let lastTime = 0;
        let dragVelocity = 0;

        function drawWheel() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            for (let i = 0; i < numSlices; i++) {
                const startAngle = currentAngle + i * sliceAngle;
                const endAngle = startAngle + sliceAngle;

                // Gambar Potongan (Slice)
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, startAngle, endAngle);
                ctx.closePath();
                ctx.fillStyle = prompts[i].color;
                ctx.fill();
                ctx.lineWidth = 3;
                ctx.strokeStyle = "#000";
                ctx.stroke();

                // Gambar Titik Hitam di Pinggir
                const dotRadius = radius - 35;
                const dotAngle = startAngle + sliceAngle / 2;
                const dotX = centerX + Math.cos(dotAngle) * dotRadius;
                const dotY = centerY + Math.sin(dotAngle) * dotRadius;
                
                ctx.beginPath();
                ctx.arc(dotX, dotY, 12, 0, 2 * Math.PI);
                ctx.fillStyle = "#000";
                ctx.fill();

                // Gambar Teks
                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(dotAngle);
                ctx.textAlign = "right";
                ctx.textBaseline = "middle";
                ctx.fillStyle = "#000";
                
                // Ukuran font dinamis menyesuaikan resolusi canvas
                ctx.font = "900 " + (radius * 0.08) + "px 'Nunito'"; 
                
                ctx.fillText(prompts[i].title, radius - 75, 0);
                ctx.restore();
            }

            // Gambar Lingkaran Tengah
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius * 0.15, 0, 2 * Math.PI);
            ctx.fillStyle = "#000";
            ctx.fill();
            
            // Tambahkan text "mezzodetto" atau "Gracious" di tengah
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillStyle = "#fff";
            ctx.font = "700 " + (radius * 0.035) + "px 'Nunito'";
            ctx.fillText("GRACIOUS", centerX, centerY);
        }

        function animateSpin() {
            currentAngle += spinVelocity;
            
            // Gesekan (Friction): Mengurangi kecepatan perlahan
            spinVelocity *= 0.985; 

            drawWheel();

            // Lanjut putar selama velocity masih di atas threshold (baik minus maupun plus)
            if (Math.abs(spinVelocity) > 0.002) {
                requestAnimationFrame(animateSpin);
            } else {
                isSpinning = false;
                spinBtn.disabled = false;
                determineWinner();
            }
        }

        // Fungsi dipanggil oleh tombol SPIN
        function triggerSpin() {
            if (isSpinning) return;
            isSpinning = true;
            spinBtn.disabled = true;
            // Kecepatan putar random
            spinVelocity = Math.random() * 0.15 + 0.25; 
            requestAnimationFrame(animateSpin);
        }

        function determineWinner() {
            // Normalisasi angle (tangani nilai minus jika diputar kebalikan)
            let normalizedAngle = currentAngle % (2 * Math.PI);
            if (normalizedAngle < 0) normalizedAngle += 2 * Math.PI;
            
            // Penunjuk ada di atas (270 derajat atau 3*PI/2)
            let winningIndex = Math.floor(( ( (3 * Math.PI / 2) - normalizedAngle + (2 * Math.PI) ) % (2 * Math.PI) ) / sliceAngle);
            
            showModal(prompts[winningIndex]);
        }

        function showModal(promptData) {
            document.getElementById('modalTitle').innerText = promptData.title;
            document.getElementById('modalTitle').style.color = promptData.color;
            document.getElementById('modalBody').innerText = promptData.text;
            document.getElementById('modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }

        // ==========================================
        // FITUR TOUCHSCREEN / SWIPE LOGIC
        // ==========================================
        
        function getEventAngle(e) {
            const rect = canvas.getBoundingClientRect();
            // Dukungan untuk sentuhan (touch) dan mouse
            const clientX = e.touches && e.touches.length > 0 ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches && e.touches.length > 0 ? e.touches[0].clientY : e.clientY;
            
            const x = clientX - rect.left - rect.width / 2;
            const y = clientY - rect.top - rect.height / 2;
            return Math.atan2(y, x);
        }

        function startDrag(e) {
            if (isSpinning) return;
            // Hanya cegah default jika ini bukan sekadar klik (opsional, tapi baik untuk touch)
            if(e.cancelable) e.preventDefault(); 
            isDragging = true;
            lastAngle = getEventAngle(e);
            lastTime = performance.now();
            dragVelocity = 0;
            spinBtn.disabled = true;
        }

        function drag(e) {
            if (!isDragging || isSpinning) return;
            if(e.cancelable) e.preventDefault();
            
            const currentMoveAngle = getEventAngle(e);
            let deltaAngle = currentMoveAngle - lastAngle;
            
            // Perbaiki loncatan sudut saat melewati sumbu X negatif (-PI ke PI)
            if (deltaAngle > Math.PI) deltaAngle -= Math.PI * 2;
            if (deltaAngle < -Math.PI) deltaAngle += Math.PI * 2;

            currentAngle += deltaAngle;
            drawWheel();

            const currentTime = performance.now();
            const deltaTime = currentTime - lastTime;
            
            // Hitung kecepatan ayunan (velocity)
            if (deltaTime > 0) {
                // Konversi ke skala frame (ms per frame) agar cocok dengan animateSpin
                dragVelocity = (deltaAngle / deltaTime) * 16; 
            }

            lastAngle = currentMoveAngle;
            lastTime = currentTime;
        }

        function endDrag(e) {
            if (!isDragging) return;
            isDragging = false;
            
            // Batasi batas maksimum kecepatan putar (jangan sampai wheel-nya "hilang")
            dragVelocity = Math.max(-0.6, Math.min(0.6, dragVelocity));

            // Jika ayunan cukup kencang, teruskan sebagai putaran (spin)
            if (Math.abs(dragVelocity) > 0.05) {
                isSpinning = true;
                spinVelocity = dragVelocity;
                requestAnimationFrame(animateSpin);
            } else {
                // Jika cuma digeser dikit dan dilepas, pastikan tombol bisa diklik lagi
                spinBtn.disabled = false;
            }
        }

        // Daftarkan Event Listener
        wheelContainer.addEventListener('mousedown', startDrag);
        wheelContainer.addEventListener('touchstart', startDrag, { passive: false });
        
        window.addEventListener('mousemove', drag);
        window.addEventListener('touchmove', drag, { passive: false });
        
        window.addEventListener('mouseup', endDrag);
        window.addEventListener('touchend', endDrag);

        // Render awal
        drawWheel();

    </script>
</body>
</html>
