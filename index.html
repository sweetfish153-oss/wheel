<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wheel of Grace</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,700;12..96,900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #000000;
            --text-color: #ffffff;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Bricolage Grotesque', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
            overscroll-behavior-y: none; 
        }

        .preload-font {
            position: absolute;
            opacity: 0;
            pointer-events: none;
            font-family: 'Bricolage Grotesque', sans-serif;
            font-weight: 900;
            z-index: -1;
        }

        .wheel-container {
            position: relative;
            width: 90vw;
            max-width: 450px; 
            aspect-ratio: 1/1;
            margin: 20px 0;
            touch-action: none; 
            cursor: grab;
        }

        .wheel-container:active {
            cursor: grabbing;
        }

        canvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            filter: drop-shadow(0 0 20px rgba(255,255,255,0.15)); 
        }

        .pointer {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 35px;
            height: 50px;
            background-color: white;
            clip-path: polygon(50% 100%, 0 0, 100% 0);
            z-index: 10;
            transform-origin: 50% 10px;
        }

        .pointer.tick {
            animation: tickAnim 0.15s cubic-bezier(0.25, 0.1, 0.25, 1);
        }

        @keyframes tickAnim {
            0% { transform: translateX(-50%) rotate(0deg); }
            30% { transform: translateX(-50%) rotate(15deg); }
            100% { transform: translateX(-50%) rotate(0deg); }
        }

        /* Modal / Pop-up */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 100;
            padding: 20px;
            box-sizing: border-box;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background: #fff;
            color: #000;
            padding: 30px 20px;
            border-radius: 20px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            transform: translateY(20px);
            transition: transform 0.3s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .modal-overlay.active .modal-content {
            transform: translateY(0);
        }

        .modal-title {
            font-family: 'Bricolage Grotesque', sans-serif;
            font-weight: 900;
            font-size: 1.8rem;
            margin-top: 0;
            margin-bottom: 15px;
            line-height: 1.2;
        }

        .modal-body {
            font-family: 'Bricolage Grotesque', sans-serif;
            font-size: 1.1rem;
            line-height: 1.5;
            margin-bottom: 25px;
            font-weight: 700;
        }

        button.close-btn {
            font-family: 'Bricolage Grotesque', sans-serif;
            font-weight: 900;
            background-color: #000;
            color: #fff;
            border: none;
            padding: 12px 35px;
            font-size: 1.1rem;
            border-radius: 30px;
            cursor: pointer;
            transition: background-color 0.2s;
            width: 100%;
            max-width: 200px;
        }

        button.close-btn:hover {
            background-color: #333;
        }
    </style>
</head>
<body>

    <div class="preload-font">Font Loader</div>

    <div class="wheel-container" id="wheelContainer">
        <div class="pointer" id="pointerEl"></div>
        <canvas id="wheelCanvas" width="800" height="800" style="border-radius: 0;"></canvas>
    </div>

    <!-- Popup Modal -->
    <div class="modal-overlay" id="modal">
        <div class="modal-content">
            <h2 class="modal-title" id="modalTitle">Title</h2>
            <div class="modal-body" id="modalBody">Description goes here</div>
            <button class="close-btn" onclick="closeModal()">Oke!</button>
        </div>
    </div>

    <script>
        const prompts = [
            { wheelTitle: "BDG 48", popupTitle: "+1-3 BDG 48", color: "#7964b3", textColor: "#e3e0c8", dotColor: "#000000", text: "Kelompok lawan boleh rekues lagu sekolah minggu untuk dinyanyikan keras-keras dan pakai gerakan oleh seluruh anggota kelompok. Kelompok lawan menilai dan memberikan poin antara 1-3." },
            // 2. Titik (dotColor) AYAT EMAS dikembalikan ke Hitam (#000000)
            { wheelTitle: "AYAT EMAS", popupTitle: "+1 AYAT EMAS", color: "#000000", textColor: "#e3e0c8", dotColor: "#000000", text: "Diberi waktu persiapan 30 dtk, seluruh anggota kelompok berdiri untuk ayat hafalan apapun bersama-sama." },
            // 3. Popup FOTSTUD warnanya dibuat lebih tua jadi hijau/coklat gelap (#8c8761)
            { wheelTitle: "FOTSTUD", popupTitle: "+1-3 FotStud", color: "#e3e0c8", popupColor: "#8c8761", textColor: "#000000", dotColor: "#000000", text: "Diberi 30 detik untuk berpose kelompok sekreatif mungkin. Kelompok lawan menilai dan memberikan poin antara 1-3." },
            { wheelTitle: "BESTIES", popupTitle: "+1 Besties", color: "#f6a5c0", textColor: "#000000", dotColor: "#000000", text: "Perwakilan kelompok sebutin nama semua anggota grup lawan. Kalau bisa dengan nama belakang +2." },
            { wheelTitle: "SILSILAH", popupTitle: "+1-4 Silsilah", color: "#227031", textColor: "#e3e0c8", dotColor: "#000000", text: "Menyebutkan dengan benar umur (pada saat itu) semua anggota grup lawan. Benar semua: +4, setiap salah -1, maks salah 3x." },
            { wheelTitle: "APRESIASI", popupTitle: "+1 Apresiasi", color: "#ff6f3c", textColor: "#000000", dotColor: "#000000", text: "Bilang makasih/kasih pujian yang tulus dan melelehkan hati panitia setempat <3. Kalau panitia merasa tersentuh ginjalnya panitia bisa menambahkan 1 poin lagi." },
            { wheelTitle: "CEMARA", popupTitle: "+2 Cemara", color: "#a5e2c2", popupColor: "#16864a", textColor: "#000000", dotColor: "#000000", text: "Dalam 30 detik bisa baris berdasarkan urutan ulang tahun/nama belakang/dkk (penjaga pos yg pilih)." }
        ];

        const canvas = document.getElementById("wheelCanvas");
        const ctx = canvas.getContext("2d");
        const wheelContainer = document.getElementById("wheelContainer");
        const pointerEl = document.getElementById("pointerEl");
        
        let currentAngle = -Math.PI / 2 + ((2 * Math.PI / prompts.length) / 2);
        let isSpinning = false;
        
        // Animasi spin logic
        let isButtonSpin = false;
        let spinStartAngle = 0;
        let spinTargetAngle = 0;
        let spinStartTime = 0;
        const SPIN_DURATION = 10000;

        let spinVelocity = 0;
        let isDragging = false;
        let lastAngle = 0;
        let lastTime = 0;
        let dragVelocity = 0;
        let lastActiveSlice = -1;

        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;
        const radius = canvas.width / 2 - 10;
        const centerCircleRadius = radius * 0.18; 
        const numSlices = prompts.length;
        const sliceAngle = (2 * Math.PI) / numSlices;

        function updatePointerTick() {
            let normalizedAngle = currentAngle % (2 * Math.PI);
            if (normalizedAngle < 0) normalizedAngle += 2 * Math.PI;
            let activeSlice = Math.floor(( ( (3 * Math.PI / 2) - normalizedAngle + (2 * Math.PI) ) % (2 * Math.PI) ) / sliceAngle);
            
            if (activeSlice !== lastActiveSlice) {
                if (lastActiveSlice !== -1 && isSpinning) {
                    pointerEl.classList.remove("tick");
                    void pointerEl.offsetWidth; 
                    pointerEl.classList.add("tick");
                }
                lastActiveSlice = activeSlice;
            }
        }

        function drawWheel() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            updatePointerTick();
            
            for (let i = 0; i < numSlices; i++) {
                const startAngle = currentAngle + i * sliceAngle;
                const endAngle = startAngle + sliceAngle;

                const p1x = centerX + Math.cos(startAngle) * radius;
                const p1y = centerY + Math.sin(startAngle) * radius;
                const p2x = centerX + Math.cos(endAngle) * radius;
                const p2y = centerY + Math.sin(endAngle) * radius;

                // Segi-7 Slice
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.lineTo(p1x, p1y);
                ctx.lineTo(p2x, p2y);
                ctx.closePath();
                ctx.fillStyle = prompts[i].color;
                ctx.fill();

                // 4. Dot size dikecilkan 30% dari 20 menjadi 14
                const getDotPos = (frac) => {
                    const cx = p1x + (p2x - p1x) * frac;
                    const cy = p1y + (p2y - p1y) * frac;
                    const dist = Math.sqrt((cx - centerX)**2 + (cy - centerY)**2);
                    const ratio = (dist - 45) / dist; 
                    return { x: centerX + (cx - centerX) * ratio, y: centerY + (cy - centerY) * ratio };
                };
                
                const dot1 = getDotPos(0.28);
                const dot2 = getDotPos(0.72);
                const dotSize = 14; // Lebih kecil

                ctx.fillStyle = prompts[i].dotColor; 
                ctx.beginPath();
                ctx.arc(dot1.x, dot1.y, dotSize, 0, 2*Math.PI);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(dot2.x, dot2.y, dotSize, 0, 2*Math.PI);
                ctx.fill();

                // Teks
                ctx.save();
                ctx.translate(centerX, centerY);
                const textAngle = startAngle + sliceAngle / 2;
                ctx.rotate(textAngle);
                ctx.textAlign = "right";
                ctx.textBaseline = "middle";
                ctx.fillStyle = prompts[i].textColor; 
                
                ctx.font = "900 " + (radius * 0.09) + "px 'Bricolage Grotesque'"; 
                const textRadiusLimit = radius * Math.cos(Math.PI / numSlices) - 75;
                ctx.fillText(prompts[i].wheelTitle, textRadiusLimit, 0); 
                ctx.restore();
            }

            // Lingkaran Tengah Hitam
            ctx.beginPath();
            ctx.arc(centerX, centerY, centerCircleRadius, 0, 2 * Math.PI);
            ctx.fillStyle = "#000000";
            ctx.fill();
            
            // Gambar Logo Rumah Warna Krem
            const hSize = radius * 0.065;
            const hY = centerY + hSize * 0.15;
            ctx.beginPath();
            ctx.moveTo(centerX, hY - hSize*0.9);           
            ctx.lineTo(centerX + hSize*0.9, hY);           
            ctx.lineTo(centerX + hSize*0.7, hY);           
            ctx.lineTo(centerX + hSize*0.7, hY + hSize*0.8); 
            ctx.lineTo(centerX - hSize*0.7, hY + hSize*0.8); 
            ctx.lineTo(centerX - hSize*0.7, hY);           
            ctx.lineTo(centerX - hSize*0.9, hY);           
            ctx.closePath();
            ctx.fillStyle = "#e3e0c8"; 
            ctx.fill();
        }

        // ==========================================
        // 1. ANIMASI GAUSSIAN VELOCITY + LONG TAIL
        // ==========================================
        
        function customDramaticEase(t) {
            // Menggunakan distribusi Weibull (berbentuk seperti kurva lonceng Gaussian)
            // Kecepatan di awal akan naik perlahan -> Puncak mulus -> Menurun sangat lama di akhir
            const k = 7; 
            const val = 1 - Math.exp(-k * t * t);
            const maxVal = 1 - Math.exp(-k);
            return val / maxVal;
        }

        function triggerSpin() {
            if (isSpinning) return;
            isSpinning = true;
            isButtonSpin = true; 
            
            spinStartAngle = currentAngle;
            
            // Speed maks diturunkan dengan mengurangi jumlah total putaran menjadi 3 - 4 saja
            const randomRotations = (Math.floor(Math.random() * 2) + 3) * Math.PI * 2;
            const randomExtra = Math.random() * Math.PI * 2;
            
            spinTargetAngle = currentAngle + randomRotations + randomExtra;
            spinStartTime = performance.now();
            
            requestAnimationFrame(animateEaseSpin);
        }

        function animateEaseSpin(time) {
            if (!isSpinning || !isButtonSpin) return;

            let elapsed = time - spinStartTime;
            
            if (elapsed >= SPIN_DURATION) {
                currentAngle = spinTargetAngle;
                drawWheel();
                isSpinning = false;
                determineWinner();
                return;
            }

            let t = elapsed / SPIN_DURATION;
            let easedT = customDramaticEase(t); 
            
            currentAngle = spinStartAngle + (spinTargetAngle - spinStartAngle) * easedT;
            drawWheel();

            requestAnimationFrame(animateEaseSpin);
        }

        // ANIMASI SWIPE (GESEK MANUAL)
        function animateFrictionSpin() {
            if (!isSpinning || isButtonSpin) return;

            currentAngle += spinVelocity;
            spinVelocity *= 0.985; 

            drawWheel();

            if (Math.abs(spinVelocity) > 0.002) {
                requestAnimationFrame(animateFrictionSpin);
            } else {
                isSpinning = false;
                determineWinner();
            }
        }

        // INPUT LOGIC
        function startDrag(e) {
            if (isSpinning) return;
            
            const rect = canvas.getBoundingClientRect();
            let clientX = e.touches && e.touches.length > 0 ? e.touches[0].clientX : e.clientX;
            let clientY = e.touches && e.touches.length > 0 ? e.touches[0].clientY : e.clientY;
            
            const x = clientX - rect.left - rect.width / 2;
            const y = clientY - rect.top - rect.height / 2;
            
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const actualDist = Math.sqrt((x * scaleX)**2 + (y * scaleY)**2);
            
            if (actualDist <= centerCircleRadius) {
                if(e.cancelable) e.preventDefault(); 
                triggerSpin();
                return;
            }

            if(e.cancelable) e.preventDefault(); 
            isDragging = true;
            lastAngle = Math.atan2(y, x);
            lastTime = performance.now();
            dragVelocity = 0;
        }

        function drag(e) {
            if (!isDragging || isSpinning) return;
            if(e.cancelable) e.preventDefault();
            
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches && e.touches.length > 0 ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches && e.touches.length > 0 ? e.touches[0].clientY : e.clientY;
            const x = clientX - rect.left - rect.width / 2;
            const y = clientY - rect.top - rect.height / 2;
            
            const currentMoveAngle = Math.atan2(y, x);
            let deltaAngle = currentMoveAngle - lastAngle;
            
            if (deltaAngle > Math.PI) deltaAngle -= Math.PI * 2;
            if (deltaAngle < -Math.PI) deltaAngle += Math.PI * 2;

            currentAngle += deltaAngle;
            drawWheel();

            const currentTime = performance.now();
            const deltaTime = currentTime - lastTime;
            
            if (deltaTime > 0) {
                dragVelocity = (deltaAngle / deltaTime) * 16; 
            }

            lastAngle = currentMoveAngle;
            lastTime = currentTime;
        }

        function endDrag(e) {
            if (!isDragging) return;
            isDragging = false;
            dragVelocity = Math.max(-0.5, Math.min(0.5, dragVelocity));

            if (Math.abs(dragVelocity) > 0.05) {
                isSpinning = true;
                isButtonSpin = false;
                spinVelocity = dragVelocity;
                requestAnimationFrame(animateFrictionSpin);
            }
        }

        wheelContainer.addEventListener('mousedown', startDrag);
        wheelContainer.addEventListener('touchstart', startDrag, { passive: false });
        window.addEventListener('mousemove', drag);
        window.addEventListener('touchmove', drag, { passive: false });
        window.addEventListener('mouseup', endDrag);
        window.addEventListener('touchend', endDrag);

        wheelContainer.addEventListener('mousemove', function(e) {
            if (isSpinning) return;
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left - rect.width / 2;
            const y = e.clientY - rect.top - rect.height / 2;
            const actualDist = Math.sqrt((x * (canvas.width / rect.width))**2 + (y * (canvas.height / rect.height))**2);
            
            if (actualDist <= centerCircleRadius) {
                wheelContainer.style.cursor = 'pointer';
            } else {
                wheelContainer.style.cursor = isDragging ? 'grabbing' : 'grab';
            }
        });

        function determineWinner() {
            let normalizedAngle = currentAngle % (2 * Math.PI);
            if (normalizedAngle < 0) normalizedAngle += 2 * Math.PI;
            
            let winningIndex = Math.floor(( ( (3 * Math.PI / 2) - normalizedAngle + (2 * Math.PI) ) % (2 * Math.PI) ) / sliceAngle);
            
            confetti({
                particleCount: 120,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#7964b3', '#f6a5c0', '#227031', '#ff6f3c', '#a5e2c2', '#e3e0c8']
            });

            setTimeout(() => {
                showModal(prompts[winningIndex]);
            }, 600);
        }

        function showModal(promptData) {
            document.getElementById('modalTitle').innerText = promptData.popupTitle;
            document.getElementById('modalTitle').style.color = promptData.popupColor || promptData.color;
            document.getElementById('modalBody').innerText = promptData.text;
            document.getElementById('modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }

        let fontRenderTicks = 0;
        let fontInterval = setInterval(() => {
            drawWheel();
            fontRenderTicks++;
            if(fontRenderTicks > 15) {
                clearInterval(fontInterval);
            }
        }, 100);

        if (document.fonts) {
            document.fonts.ready.then(() => {
                drawWheel();
            });
        }
        
        drawWheel();

    </script>
</body>
</html>
