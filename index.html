<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wheel of Grace</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Link pemuatan Bricolage Grotesque -->
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #000000;
            --text-color: #ffffff;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Bricolage Grotesque', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
            overscroll-behavior-y: none; 
        }

        /* Elemen tersembunyi untuk memaksa HP memuat font lebih awal */
        .preload-font {
            position: absolute;
            opacity: 0;
            pointer-events: none;
            font-family: 'Bricolage Grotesque', sans-serif;
            font-weight: 900;
        }

        .wheel-container {
            position: relative;
            width: 90vw;
            max-width: 450px; 
            aspect-ratio: 1/1;
            margin: 20px 0;
            touch-action: none; 
            cursor: grab;
        }

        .wheel-container:active {
            cursor: grabbing;
        }

        canvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(255,255,255,0.15); 
        }

        /* Jarum penunjuk warna putih di atas */
        .pointer {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 35px;
            height: 50px;
            background-color: white;
            clip-path: polygon(50% 100%, 0 0, 100% 0);
            z-index: 10;
        }

        /* Modal / Pop-up */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 100;
            padding: 20px;
            box-sizing: border-box;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background: #fff;
            color: #000;
            padding: 30px 20px;
            border-radius: 20px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            transform: translateY(20px);
            transition: transform 0.3s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .modal-overlay.active .modal-content {
            transform: translateY(0);
        }

        .modal-title {
            font-family: 'Bricolage Grotesque', sans-serif;
            font-weight: 900;
            font-size: 1.8rem;
            margin-top: 0;
            margin-bottom: 15px;
            line-height: 1.2;
        }

        .modal-body {
            font-family: 'Bricolage Grotesque', sans-serif;
            font-size: 1.1rem;
            line-height: 1.5;
            margin-bottom: 25px;
            font-weight: 700;
        }

        button.close-btn {
            font-family: 'Bricolage Grotesque', sans-serif;
            font-weight: 900;
            background-color: #000;
            color: #fff;
            border: none;
            padding: 12px 35px;
            font-size: 1.1rem;
            border-radius: 30px;
            cursor: pointer;
            transition: background-color 0.2s;
            width: 100%;
            max-width: 200px;
        }

        button.close-btn:hover {
            background-color: #333;
        }

    </style>
</head>
<body>

    <div class="preload-font">Preload Bricolage Font</div>

    <div class="wheel-container" id="wheelContainer">
        <div class="pointer"></div>
        <canvas id="wheelCanvas" width="800" height="800"></canvas>
    </div>

    <!-- Popup Modal -->
    <div class="modal-overlay" id="modal">
        <div class="modal-content">
            <h2 class="modal-title" id="modalTitle">Title</h2>
            <div class="modal-body" id="modalBody">Description goes here</div>
            <button class="close-btn" onclick="closeModal()">Got it!</button>
        </div>
    </div>

    <script>
        // Penyesuaian warna (Cyan muda & Hijau lebih tua dengan teks krem)
        const prompts = [
            { title: "+1-3 BDG 48", color: "#7964b3", textColor: "#000000", text: "Kelompok lawan boleh rekues lagu sekolah minggu untuk dinyanyikan keras-keras dan pakai gerakan oleh seluruh anggota kelompok. Kelompok lawan menilai dan memberikan poin antara 1-3." },
            { title: "+1 AYAT EMAS", color: "#000000", textColor: "#e3e0c8", text: "Diberi waktu persiapan 30 dtk, seluruh anggota kelompok berdiri untuk ayat hafalan apapun bersama-sama." },
            { title: "+1-3 FotStud", color: "#e3e0c8", textColor: "#000000", text: "Diberi 30 detik untuk berpose kelompok sekreatif mungkin. Kelompok lawan menilai dan memberikan poin antara 1-3." },
            { title: "+1 Besties", color: "#f6a5c0", textColor: "#000000", text: "Perwakilan kelompok sebutin nama semua anggota grup lawan. Kalau bisa dengan nama belakang +2." },
            { title: "+1-4 Silsilah", color: "#227031", textColor: "#e3e0c8", text: "Menyebutkan dengan benar umur (pada saat itu) semua anggota grup lawan. Benar semua: +4, setiap salah -1, maks salah 3x." }, // Hijau tua, krem text
            { title: "+1 Apresiasi", color: "#ff6f3c", textColor: "#000000", text: "Bilang makasih/kasih pujian yang tulus dan melelehkan hati panitia setempat <3. Kalau panitia merasa tersentuh ginjalnya panitia bisa menambahkan 1 poin lagi." },
            { title: "+2 Cemara", color: "#a5e2c2", textColor: "#e3e0c8", text: "Dalam 30 detik bisa baris berdasarkan urutan ulang tahun/nama belakang/dkk (penjaga pos yg pilih)." } // Cyan muda, krem text
        ];

        const canvas = document.getElementById("wheelCanvas");
        const ctx = canvas.getContext("2d");
        const wheelContainer = document.getElementById("wheelContainer");
        
        let currentAngle = -Math.PI / 2 + ((2 * Math.PI / prompts.length) / 2);
        let isSpinning = false;
        
        // Setup animasi spin center button
        let isButtonSpin = false;
        let spinStartAngle = 0;
        let spinTargetAngle = 0;
        let spinStartTime = 0;
        const SPIN_DURATION = 8000; // 8 detik (sangat dramatis di akhir)

        // Variabel swipe
        let spinVelocity = 0;
        let isDragging = false;
        let lastAngle = 0;
        let lastTime = 0;
        let dragVelocity = 0;

        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;
        const radius = canvas.width / 2;
        const centerCircleRadius = radius * 0.14; // Circle tengah dikecilkan 50%
        const numSlices = prompts.length;
        const sliceAngle = (2 * Math.PI) / numSlices;

        function drawWheel() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            for (let i = 0; i < numSlices; i++) {
                const startAngle = currentAngle + i * sliceAngle;
                const endAngle = startAngle + sliceAngle;

                // Slice
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, startAngle, endAngle);
                ctx.closePath();
                ctx.fillStyle = prompts[i].color;
                ctx.fill();

                // 2 Titik atas/bawah yang mengikuti lekukan terluar porsi
                const dotRadius = radius - 30; 
                const offsetAngle = sliceAngle * 0.18; // Jarak posisi titik dari pinggir garis porsi
                const dotAngle1 = startAngle + offsetAngle;
                const dotAngle2 = endAngle - offsetAngle;
                const dotSize = 22; // Diperbesar
                
                ctx.beginPath();
                ctx.arc(centerX + Math.cos(dotAngle1) * dotRadius, centerY + Math.sin(dotAngle1) * dotRadius, dotSize, 0, 2 * Math.PI);
                ctx.fillStyle = "#000";
                ctx.fill();

                ctx.beginPath();
                ctx.arc(centerX + Math.cos(dotAngle2) * dotRadius, centerY + Math.sin(dotAngle2) * dotRadius, dotSize, 0, 2 * Math.PI);
                ctx.fill();

                // Teks
                ctx.save();
                ctx.translate(centerX, centerY);
                const textAngle = startAngle + sliceAngle / 2;
                ctx.rotate(textAngle);
                ctx.textAlign = "right";
                ctx.textBaseline = "middle";
                ctx.fillStyle = prompts[i].textColor; 
                
                ctx.font = "900 " + (radius * 0.075) + "px 'Bricolage Grotesque'"; 
                // Teks ditarik lumayan keluar karena 2 titiknya sekarang ada di atas/bawah lengkungan
                ctx.fillText(prompts[i].title, radius - 75, 0); 
                ctx.restore();
            }

            // Lingkaran Tengah & Tombol
            ctx.beginPath();
            ctx.arc(centerX, centerY, centerCircleRadius, 0, 2 * Math.PI);
            ctx.fillStyle = "#000000";
            ctx.fill();
            
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillStyle = "#ffffff";
            
            // Text "Wheel of"
            ctx.font = "700 " + (radius * 0.035) + "px 'Bricolage Grotesque'";
            ctx.fillText("Wheel of", centerX, centerY - radius * 0.032);
            
            // Text "GRACE"
            ctx.font = "900 " + (radius * 0.065) + "px 'Bricolage Grotesque'";
            ctx.fillText("GRACE", centerX, centerY + radius * 0.035);
        }

        // ==========================================
        // ANIMASI SLOW IN (SANGAT) SLOW OUT
        // ==========================================
        
        function customDramaticEase(t) {
            // Pertama 20% waktu: wheel melaju super kencang
            if (t < 0.2) return 12.5 * t * t * t; 
            // Sisanya 80% waktu (6.4 detik): Melambat perlahan sangat dramatis hingga mati
            let nt = (t - 0.2) / 0.8;
            return 0.1 + 0.9 * (1 - Math.pow(1 - nt, 5)); 
        }

        function triggerSpin() {
            if (isSpinning) return;
            isSpinning = true;
            isButtonSpin = true; 
            
            spinStartAngle = currentAngle;
            // Target putaran: 6 hingga 9 putaran penuh + random ekstra (biar kenceng banget)
            const randomRotations = (Math.floor(Math.random() * 4) + 6) * Math.PI * 2;
            const randomExtra = Math.random() * Math.PI * 2;
            
            spinTargetAngle = currentAngle + randomRotations + randomExtra;
            spinStartTime = performance.now();
            
            requestAnimationFrame(animateEaseSpin);
        }

        function animateEaseSpin(time) {
            if (!isSpinning || !isButtonSpin) return;

            let elapsed = time - spinStartTime;
            
            if (elapsed >= SPIN_DURATION) {
                currentAngle = spinTargetAngle;
                drawWheel();
                isSpinning = false;
                determineWinner();
                return;
            }

            let t = elapsed / SPIN_DURATION;
            let easedT = customDramaticEase(t); 
            
            currentAngle = spinStartAngle + (spinTargetAngle - spinStartAngle) * easedT;
            drawWheel();

            requestAnimationFrame(animateEaseSpin);
        }

        // ==========================================
        // ANIMASI SWIPE (GESEK MANUAL)
        // ==========================================

        function animateFrictionSpin() {
            if (!isSpinning || isButtonSpin) return;

            currentAngle += spinVelocity;
            spinVelocity *= 0.985; // Efek friksi

            drawWheel();

            if (Math.abs(spinVelocity) > 0.002) {
                requestAnimationFrame(animateFrictionSpin);
            } else {
                isSpinning = false;
                determineWinner();
            }
        }

        // ==========================================
        // INPUT TOUCH, SWIPE & CENTER CLICK LOGIC
        // ==========================================

        function startDrag(e) {
            if (isSpinning) return;
            
            const rect = canvas.getBoundingClientRect();
            let clientX = e.touches && e.touches.length > 0 ? e.touches[0].clientX : e.clientX;
            let clientY = e.touches && e.touches.length > 0 ? e.touches[0].clientY : e.clientY;
            
            const x = clientX - rect.left - rect.width / 2;
            const y = clientY - rect.top - rect.height / 2;
            
            // Konversi radius dari resolusi CSS ke resolusi internal Canvas (800x800)
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const actualDist = Math.sqrt((x * scaleX)**2 + (y * scaleY)**2);
            
            // Cek apakah klik berada di dalam area lingkaran pusat
            if (actualDist <= centerCircleRadius) {
                if(e.cancelable) e.preventDefault(); 
                triggerSpin();
                return;
            }

            // Jika di luar titik tengah, mulai proses gesek/drag
            if(e.cancelable) e.preventDefault(); 
            isDragging = true;
            lastAngle = Math.atan2(y, x);
            lastTime = performance.now();
            dragVelocity = 0;
        }

        function drag(e) {
            if (!isDragging || isSpinning) return;
            if(e.cancelable) e.preventDefault();
            
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches && e.touches.length > 0 ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches && e.touches.length > 0 ? e.touches[0].clientY : e.clientY;
            const x = clientX - rect.left - rect.width / 2;
            const y = clientY - rect.top - rect.height / 2;
            
            const currentMoveAngle = Math.atan2(y, x);
            let deltaAngle = currentMoveAngle - lastAngle;
            
            if (deltaAngle > Math.PI) deltaAngle -= Math.PI * 2;
            if (deltaAngle < -Math.PI) deltaAngle += Math.PI * 2;

            currentAngle += deltaAngle;
            drawWheel();

            const currentTime = performance.now();
            const deltaTime = currentTime - lastTime;
            
            if (deltaTime > 0) {
                dragVelocity = (deltaAngle / deltaTime) * 16; 
            }

            lastAngle = currentMoveAngle;
            lastTime = currentTime;
        }

        function endDrag(e) {
            if (!isDragging) return;
            isDragging = false;
            
            dragVelocity = Math.max(-0.6, Math.min(0.6, dragVelocity));

            if (Math.abs(dragVelocity) > 0.05) {
                isSpinning = true;
                isButtonSpin = false;
                spinVelocity = dragVelocity;
                requestAnimationFrame(animateFrictionSpin);
            }
        }

        // Event Listener Mouse dan Touch
        wheelContainer.addEventListener('mousedown', startDrag);
        wheelContainer.addEventListener('touchstart', startDrag, { passive: false });
        window.addEventListener('mousemove', drag);
        window.addEventListener('touchmove', drag, { passive: false });
        window.addEventListener('mouseup', endDrag);
        window.addEventListener('touchend', endDrag);

        // Hover Effect untuk menandai bahwa bagian tengah itu bisa ditekan
        wheelContainer.addEventListener('mousemove', function(e) {
            if (isSpinning) return;
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left - rect.width / 2;
            const y = e.clientY - rect.top - rect.height / 2;
            const actualDist = Math.sqrt((x * (canvas.width / rect.width))**2 + (y * (canvas.height / rect.height))**2);
            
            if (actualDist <= centerCircleRadius) {
                wheelContainer.style.cursor = 'pointer';
            } else {
                wheelContainer.style.cursor = isDragging ? 'grabbing' : 'grab';
            }
        });

        // ==========================================
        // LOGIC PEMENANG & MODAL POP-UP
        // ==========================================

        function determineWinner() {
            let normalizedAngle = currentAngle % (2 * Math.PI);
            if (normalizedAngle < 0) normalizedAngle += 2 * Math.PI;
            
            let winningIndex = Math.floor(( ( (3 * Math.PI / 2) - normalizedAngle + (2 * Math.PI) ) % (2 * Math.PI) ) / sliceAngle);
            showModal(prompts[winningIndex]);
        }

        function showModal(promptData) {
            document.getElementById('modalTitle').innerText = promptData.title;
            document.getElementById('modalTitle').style.color = promptData.color;
            document.getElementById('modalBody').innerText = promptData.text;
            document.getElementById('modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }

        // Render memastikan font selesai direload via js document object jika didukung web browser
        document.fonts.ready.then(() => {
            drawWheel();
        });
        
        // Panggilan awal fallback
        drawWheel();

    </script>
</body>
</html>
