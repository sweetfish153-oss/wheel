<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wheel of Grace</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- 1. Mengganti semua font ke Bricolage Grotesque -->
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #000000;
            --text-color: #ffffff;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Bricolage Grotesque', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
            overscroll-behavior-y: none; 
        }

        .wheel-container {
            position: relative;
            width: 90vw;
            max-width: 450px; 
            aspect-ratio: 1/1;
            margin: 20px 0;
            touch-action: none; 
            cursor: grab;
        }

        .wheel-container:active {
            cursor: grabbing;
        }

        canvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(255,255,255,0.15); 
        }

        /* Jarum penunjuk warna putih di atas */
        .pointer {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 35px;
            height: 50px;
            background-color: white;
            clip-path: polygon(50% 100%, 0 0, 100% 0);
            z-index: 10;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .hint {
            font-size: 0.9rem;
            color: #aaa;
            margin-bottom: 5px;
            font-weight: 700;
        }

        button.spin-btn {
            font-family: 'Bricolage Grotesque', sans-serif;
            background-color: #fff;
            color: #000;
            border: none;
            padding: 15px 50px;
            font-size: 1.5rem;
            font-weight: 900;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
            touch-action: manipulation;
        }

        button.spin-btn:hover {
            transform: scale(1.05);
            background-color: #f0f0f0;
        }

        button.spin-btn:active {
            transform: scale(0.95);
        }

        button.spin-btn:disabled {
            background-color: #555;
            color: #222;
            cursor: not-allowed;
            transform: none;
        }

        /* Modal / Pop-up */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 100;
            padding: 20px;
            box-sizing: border-box;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background: #fff;
            color: #000;
            padding: 30px 20px;
            border-radius: 20px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            transform: translateY(20px);
            transition: transform 0.3s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .modal-overlay.active .modal-content {
            transform: translateY(0);
        }

        .modal-title {
            font-family: 'Bricolage Grotesque', sans-serif;
            font-weight: 900;
            font-size: 1.8rem;
            margin-top: 0;
            margin-bottom: 15px;
            line-height: 1.2;
        }

        .modal-body {
            font-family: 'Bricolage Grotesque', sans-serif;
            font-size: 1.1rem;
            line-height: 1.5;
            margin-bottom: 25px;
            font-weight: 700;
        }

        button.close-btn {
            font-family: 'Bricolage Grotesque', sans-serif;
            font-weight: 900;
            background-color: #000;
            color: #fff;
            border: none;
            padding: 12px 35px;
            font-size: 1.1rem;
            border-radius: 30px;
            cursor: pointer;
            transition: background-color 0.2s;
            width: 100%;
            max-width: 200px;
        }

        button.close-btn:hover {
            background-color: #333;
        }

    </style>
</head>
<body>

    <!-- 6. Judul di atas dihapus, akan diganti jadi tulisan GRACE di tengah roda -->
    <div class="wheel-container" id="wheelContainer">
        <div class="pointer"></div>
        <canvas id="wheelCanvas" width="800" height="800"></canvas>
    </div>

    <div class="controls">
        <div class="hint">Tap button or swipe the wheel!</div>
        <button class="spin-btn" id="spinBtn" onclick="triggerSpin()">SPIN</button>
    </div>

    <!-- Popup Modal -->
    <div class="modal-overlay" id="modal">
        <div class="modal-content">
            <h2 class="modal-title" id="modalTitle">Title</h2>
            <div class="modal-body" id="modalBody">Description goes here</div>
            <button class="close-btn" onclick="closeModal()">Got it!</button>
        </div>
    </div>

    <script>
        // 7. Prompt text disesuaikan case-nya
        // 5. & 2. Penyesuaian Hex Color mirip dengan referensi
        const prompts = [
            { title: "+1-3 BDG 48", color: "#7964b3", textColor: "#000000", text: "Kelompok lawan boleh rekues lagu sekolah minggu untuk dinyanyikan keras-keras dan pakai gerakan oleh seluruh anggota kelompok. Kelompok lawan menilai dan memberikan poin antara 1-3." },
            { title: "+1 AYAT EMAS", color: "#000000", textColor: "#e3e0c8", text: "Diberi waktu persiapan 30 dtk, seluruh anggota kelompok berdiri untuk ayat hafalan apapun bersama-sama." }, // 2. Hitam dengan teks krem
            { title: "+1-3 FotStud", color: "#e3e0c8", textColor: "#000000", text: "Diberi 30 detik untuk berpose kelompok sekreatif mungkin. Kelompok lawan menilai dan memberikan poin antara 1-3." },
            { title: "+1 Besties", color: "#f6a5c0", textColor: "#000000", text: "Perwakilan kelompok sebutin nama semua anggota grup lawan. Kalau bisa dengan nama belakang +2." },
            { title: "+1-4 Silsilah", color: "#389e47", textColor: "#000000", text: "Menyebutkan dengan benar umur (pada saat itu) semua anggota grup lawan. Benar semua: +4, setiap salah -1, maks salah 3x." }, // 5. Ijo agak kuning (Grass Green)
            { title: "+1 Apresiasi", color: "#ff6f3c", textColor: "#000000", text: "Bilang makasih/kasih pujian yang tulus dan melelehkan hati panitia setempat <3. Kalau panitia merasa tersentuh ginjalnya panitia bisa menambahkan 1 poin lagi." },
            { title: "+2 Cemara", color: "#85d1a5", textColor: "#000000", text: "Dalam 30 detik bisa baris berdasarkan urutan ulang tahun/nama belakang/dkk (penjaga pos yg pilih)." } // 5. Ijo Cyan (Mint)
        ];

        const canvas = document.getElementById("wheelCanvas");
        const ctx = canvas.getContext("2d");
        const spinBtn = document.getElementById("spinBtn");
        const wheelContainer = document.getElementById("wheelContainer");
        
        let currentAngle = -Math.PI / 2 + ((2 * Math.PI / prompts.length) / 2);
        let isSpinning = false;
        
        // Setup variabel khusus untuk animasi baru (ease-in-out)
        let isButtonSpin = false;
        let spinStartAngle = 0;
        let spinTargetAngle = 0;
        let spinStartTime = 0;
        const SPIN_DURATION = 5500; // Durasi putaran tombol (5.5 detik)

        // Variabel untuk fitur swipe (gesekan fisik)
        let spinVelocity = 0;
        let isDragging = false;
        let lastAngle = 0;
        let lastTime = 0;
        let dragVelocity = 0;

        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;
        const radius = canvas.width / 2;
        const numSlices = prompts.length;
        const sliceAngle = (2 * Math.PI) / numSlices;

        function drawWheel() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            for (let i = 0; i < numSlices; i++) {
                const startAngle = currentAngle + i * sliceAngle;
                const endAngle = startAngle + sliceAngle;

                // Gambar Slice
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, startAngle, endAngle);
                ctx.closePath();
                ctx.fillStyle = prompts[i].color;
                ctx.fill();
                // 3. Jangan ada outline (ctx.stroke() dihilangkan)

                // 4. Dot membesar 80% (radius semula ~12, diubah jadi 22) dan ada 2 berurutan sejajar 
                const dotSize = 22;
                const dotRadius1 = radius - 40;  // Titik terluar
                const dotRadius2 = radius - 95;  // Titik lebih ke dalam
                const dotAngle = startAngle + sliceAngle / 2;
                
                const dot1X = centerX + Math.cos(dotAngle) * dotRadius1;
                const dot1Y = centerY + Math.sin(dotAngle) * dotRadius1;
                const dot2X = centerX + Math.cos(dotAngle) * dotRadius2;
                const dot2Y = centerY + Math.sin(dotAngle) * dotRadius2;
                
                // Gambar 2 titik di tiap potongannya
                ctx.beginPath();
                ctx.arc(dot1X, dot1Y, dotSize, 0, 2 * Math.PI);
                ctx.fillStyle = "#000";
                ctx.fill();

                ctx.beginPath();
                ctx.arc(dot2X, dot2Y, dotSize, 0, 2 * Math.PI);
                ctx.fill();

                // Gambar Teks
                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(dotAngle);
                ctx.textAlign = "right";
                ctx.textBaseline = "middle";
                ctx.fillStyle = prompts[i].textColor; // Teks menyesuaikan property agar Ayat Emas bisa krem
                
                ctx.font = "900 " + (radius * 0.075) + "px 'Bricolage Grotesque'"; 
                
                // Mundurin text agar tidak nabrak dua dot baru
                ctx.fillText(prompts[i].title, radius - 145, 0);
                ctx.restore();
            }

            // Lingkaran Tengah Hitam (sedikit dibesarkan untuk memuat kata GRACE)
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius * 0.23, 0, 2 * Math.PI);
            ctx.fillStyle = "#000000";
            ctx.fill();
            
            // 6. Teks tengah "GRACE"
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillStyle = "#ffffff";
            ctx.font = "900 " + (radius * 0.08) + "px 'Bricolage Grotesque'";
            ctx.fillText("GRACE", centerX, centerY);
        }

        // ==========================================
        // 8. ANIMASI SLOW IN SLOW OUT UNTUK BUTTON SPIN
        // ==========================================
        
        // Easing Quintic InOut: start lambat sekali -> tengah super kencang -> stop pelan dan halus
        function easeInOutQuint(t) {
            return t < 0.5 ? 16 * t * t * t * t * t : 1 - Math.pow(-2 * t + 2, 5) / 2;
        }

        function triggerSpin() {
            if (isSpinning) return;
            isSpinning = true;
            isButtonSpin = true; 
            spinBtn.disabled = true;
            
            spinStartAngle = currentAngle;
            // Target putaran: 5 hingga 8 putaran penuh (sangat cepat di tengah) ditambah sudut random
            const randomRotations = (Math.floor(Math.random() * 4) + 5) * Math.PI * 2;
            const randomExtra = Math.random() * Math.PI * 2;
            
            spinTargetAngle = currentAngle + randomRotations + randomExtra;
            spinStartTime = performance.now();
            
            requestAnimationFrame(animateEaseSpin);
        }

        function animateEaseSpin(time) {
            if (!isSpinning || !isButtonSpin) return;

            let elapsed = time - spinStartTime;
            
            // Menghentikan loop jika waktu habis
            if (elapsed >= SPIN_DURATION) {
                currentAngle = spinTargetAngle;
                drawWheel();
                isSpinning = false;
                spinBtn.disabled = false;
                determineWinner();
                return;
            }

            // Hitung fase progres waktu t (dari 0 ke 1)
            let t = elapsed / SPIN_DURATION;
            let easedT = easeInOutQuint(t); 
            
            // Terapkan perlambatan ke angle putaran
            currentAngle = spinStartAngle + (spinTargetAngle - spinStartAngle) * easedT;
            drawWheel();

            requestAnimationFrame(animateEaseSpin);
        }

        // ==========================================
        // ANIMASI GESEK (FRICTION) JIKA DISWIPE
        // ==========================================

        function animateFrictionSpin() {
            if (!isSpinning || isButtonSpin) return;

            currentAngle += spinVelocity;
            spinVelocity *= 0.985; 

            drawWheel();

            if (Math.abs(spinVelocity) > 0.002) {
                requestAnimationFrame(animateFrictionSpin);
            } else {
                isSpinning = false;
                spinBtn.disabled = false;
                determineWinner();
            }
        }

        // ==========================================
        // FITUR TOUCHSCREEN / SWIPE LOGIC
        // ==========================================

        function getEventAngle(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches && e.touches.length > 0 ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches && e.touches.length > 0 ? e.touches[0].clientY : e.clientY;
            
            const x = clientX - rect.left - rect.width / 2;
            const y = clientY - rect.top - rect.height / 2;
            return Math.atan2(y, x);
        }

        function startDrag(e) {
            if (isSpinning) return;
            if(e.cancelable) e.preventDefault(); 
            isDragging = true;
            lastAngle = getEventAngle(e);
            lastTime = performance.now();
            dragVelocity = 0;
            spinBtn.disabled = true;
        }

        function drag(e) {
            if (!isDragging || isSpinning) return;
            if(e.cancelable) e.preventDefault();
            
            const currentMoveAngle = getEventAngle(e);
            let deltaAngle = currentMoveAngle - lastAngle;
            
            if (deltaAngle > Math.PI) deltaAngle -= Math.PI * 2;
            if (deltaAngle < -Math.PI) deltaAngle += Math.PI * 2;

            currentAngle += deltaAngle;
            drawWheel();

            const currentTime = performance.now();
            const deltaTime = currentTime - lastTime;
            
            if (deltaTime > 0) {
                dragVelocity = (deltaAngle / deltaTime) * 16; 
            }

            lastAngle = currentMoveAngle;
            lastTime = currentTime;
        }

        function endDrag(e) {
            if (!isDragging) return;
            isDragging = false;
            
            dragVelocity = Math.max(-0.6, Math.min(0.6, dragVelocity));

            // Kalau ditarik cepat, jalankan animasi gesekan (gesekan fisik biasa agar natural)
            if (Math.abs(dragVelocity) > 0.05) {
                isSpinning = true;
                isButtonSpin = false;
                spinVelocity = dragVelocity;
                requestAnimationFrame(animateFrictionSpin);
            } else {
                spinBtn.disabled = false;
            }
        }

        // Event Listener Swipe/Drag
        wheelContainer.addEventListener('mousedown', startDrag);
        wheelContainer.addEventListener('touchstart', startDrag, { passive: false });
        window.addEventListener('mousemove', drag);
        window.addEventListener('touchmove', drag, { passive: false });
        window.addEventListener('mouseup', endDrag);
        window.addEventListener('touchend', endDrag);

        // ==========================================
        // LOGIC KEMENANGAN & POPUP
        // ==========================================

        function determineWinner() {
            let normalizedAngle = currentAngle % (2 * Math.PI);
            if (normalizedAngle < 0) normalizedAngle += 2 * Math.PI;
            
            let winningIndex = Math.floor(( ( (3 * Math.PI / 2) - normalizedAngle + (2 * Math.PI) ) % (2 * Math.PI) ) / sliceAngle);
            showModal(prompts[winningIndex]);
        }

        function showModal(promptData) {
            document.getElementById('modalTitle').innerText = promptData.title;
            // Jika warnanya hitam (#000000), tetap dipasang karena background modal warna putih jadi terbaca
            document.getElementById('modalTitle').style.color = promptData.color;
            document.getElementById('modalBody').innerText = promptData.text;
            document.getElementById('modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }

        // Render awal setelah font dimuat
        document.fonts.ready.then(() => {
            drawWheel();
        });

    </script>
</body>
</html>
